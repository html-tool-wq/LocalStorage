<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Storage Pro (Client-side)</title>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* Smooth scrollbar */
::-webkit-scrollbar {
  height: 6px;
}
::-webkit-scrollbar-thumb {
  background: #555;
  border-radius: 10px;
}
</style>
</head>

<body class="bg-gray-900 text-white p-5">

<div class="max-w-5xl mx-auto">

  <h1 class="text-2xl font-bold mb-4">☁️ Cloud Storage (IndexedDB)</h1>

  <!-- SEARCH -->
  <input id="searchInput" type="text"
    placeholder="🔍 Tìm file..."
    class="w-full mb-4 p-3 rounded bg-gray-800 outline-none">

  <!-- DROP ZONE -->
  <div id="dropZone"
    class="border-2 border-dashed border-blue-400 p-10 text-center rounded-xl cursor-pointer hover:bg-gray-800 transition">

    <p>Kéo & thả file vào đây</p>
    <p class="text-gray-400 text-sm">Hoặc click để chọn</p>

    <input type="file" id="fileInput" multiple hidden>

    <!-- PROGRESS -->
    <div class="w-full bg-gray-700 h-2 mt-4 rounded">
      <div id="progressBar" class="bg-green-500 h-2 w-0 rounded"></div>
    </div>
  </div>

  <!-- FILE LIST -->
  <div id="fileList" class="grid md:grid-cols-2 gap-4 mt-6"></div>

</div>

<script>
// ========================
// INIT INDEXEDDB
// ========================
let db;

function initDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open("CloudStorageDB", 1);

    request.onupgradeneeded = (e) => {
      db = e.target.result;
      db.createObjectStore("files", { keyPath: "id" });
    };

    request.onsuccess = (e) => {
      db = e.target.result;
      resolve();
    };

    request.onerror = reject;
  });
}

// ========================
// SAVE FILE (IndexedDB)
// ========================
async function saveFile(file) {
  const id = Date.now();

  const data = {
    id,
    name: file.name,
    size: file.size,
    type: file.type,
    date: new Date().toLocaleString(),
    blob: file // lưu trực tiếp Blob
  };

  const tx = db.transaction("files", "readwrite");
  tx.objectStore("files").add(data);

  return new Promise(res => {
    tx.oncomplete = res;
  });
}

// ========================
// GET ALL FILES
// ========================
async function getFiles() {
  return new Promise((resolve) => {
    const tx = db.transaction("files", "readonly");
    const store = tx.objectStore("files");
    const request = store.getAll();

    request.onsuccess = () => resolve(request.result);
  });
}

// ========================
// DELETE FILE
// ========================
async function deleteFile(id) {
  const tx = db.transaction("files", "readwrite");
  tx.objectStore("files").delete(id);

  return new Promise(res => {
    tx.oncomplete = res;
  });
}

// ========================
// DOWNLOAD FILE
// ========================
function downloadFile(file) {
  const url = URL.createObjectURL(file.blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = file.name;
  a.click();

  URL.revokeObjectURL(url);
}

// ========================
// FORMAT SIZE
// ========================
function formatSize(bytes) {
  return (bytes / (1024 * 1024)).toFixed(2) + " MB";
}

// ========================
// RENDER FILE LIST
// ========================
async function renderFiles(filter = "") {
  const files = await getFiles();
  const container = document.getElementById("fileList");

  container.innerHTML = "";

  files
    .filter(f => f.name.toLowerCase().includes(filter.toLowerCase()))
    .forEach(file => {

      let icon = "📄";
      if (file.type.startsWith("image")) icon = "🖼️";
      else if (file.type.startsWith("video")) icon = "🎬";

      const div = document.createElement("div");
      div.className = "bg-gray-800 p-4 rounded-xl";

      div.innerHTML = `
        <div class="text-3xl">${icon}</div>
        <div class="font-bold">${file.name}</div>
        <div class="text-sm text-gray-400">${formatSize(file.size)}</div>
        <div class="text-xs text-gray-500">${file.date}</div>

        <div class="mt-2 flex gap-2">
          <button class="bg-green-600 px-2 py-1 rounded"
            onclick='downloadHandler(${file.id})'>Download</button>

          <button class="bg-red-600 px-2 py-1 rounded"
            onclick='deleteHandler(${file.id})'>Delete</button>
        </div>
      `;

      container.appendChild(div);
    });
}

// ========================
// HANDLERS GLOBAL
// ========================
window.downloadHandler = async (id) => {
  const files = await getFiles();
  const file = files.find(f => f.id === id);
  downloadFile(file);
};

window.deleteHandler = async (id) => {
  await deleteFile(id);
  renderFiles();
};

// ========================
// PROGRESS UPLOAD (REALISTIC)
// ========================
async function uploadFile(file) {
  const progressBar = document.getElementById("progressBar");

  const chunkSize = 1024 * 1024 * 2; // 2MB mỗi chunk
  let offset = 0;

  while (offset < file.size) {
    const chunk = file.slice(offset, offset + chunkSize);

    // giả lập xử lý chunk
    await new Promise(res => setTimeout(res, 20));

    offset += chunk.size;

    const percent = (offset / file.size) * 100;
    progressBar.style.width = percent + "%";
  }

  // reset progress
  progressBar.style.width = "0%";

  await saveFile(file);
  renderFiles();
}

// ========================
// DROP ZONE EVENTS
// ========================
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

dropZone.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
  [...e.target.files].forEach(uploadFile);
};

dropZone.ondragover = (e) => {
  e.preventDefault();
  dropZone.classList.add("bg-gray-700");
};

dropZone.ondragleave = () => {
  dropZone.classList.remove("bg-gray-700");
};

dropZone.ondrop = (e) => {
  e.preventDefault();
  dropZone.classList.remove("bg-gray-700");

  [...e.dataTransfer.files].forEach(uploadFile);
};

// ========================
// SEARCH
// ========================
document.getElementById("searchInput")
  .addEventListener("input", (e) => {
    renderFiles(e.target.value);
  });

// ========================
// INIT
// ========================
(async () => {
  await initDB();
  renderFiles();
})();
</script>

</body>
</html>
